[build]
builder = "NIXPACKS"
watchEdges = [
  "backend/**",
]

[build.nixpacksPlan]
# This tells Railway to build inside the backend folder, not the root
buildImage = "ubuntu:jammy"
providers = ["python"]
path = "backend/"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["python312", "gcc"]

[build.nixpacksPlan.phases.install]
cmds = ["python -m venv /opt/venv", ". /opt/venv/bin/activate", "pip install -r backend/requirements.txt"]

[deploy]
# We run uvicorn from the backend folder
startCommand = ". /opt/venv/bin/activate && cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
